<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebPrime — Portail</title>
    <meta name="description" content="Portail WebPrime : démarrez votre projet, découvrez nos offres ou accédez à votre espace client.">
    <meta name="robots" content="noindex, follow">
    <link rel="icon" href="favicon.ico">
    <style>
        :root {
            --bg: #0b0b0d;
            --panel: #111113;
            --panel-bar: #1a1a1d;
            --border: #2a2a2e;
            --txt: #e6e6e6;
            --dim: #6b7280;
            --orange: #f97316;
            --orange-soft: #ffb156;
            --green: #22c55e;
            --blue: #38bdf8;
            --mono: 'SF Mono', 'Fira Code', 'JetBrains Mono', 'Consolas', ui-monospace, monospace;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            min-height: 100%;
            background: var(--bg);
            color: var(--txt);
            font-family: var(--mono);
        }
        body { overflow-x: hidden; }

        /* animated grid backdrop */
        body::before {
            content: "";
            position: fixed; inset: 0;
            background-image:
                linear-gradient(rgba(249,115,22,0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(249,115,22,0.04) 1px, transparent 1px);
            background-size: 38px 38px;
            -webkit-mask-image: radial-gradient(ellipse 80% 70% at 50% 40%, #000 40%, transparent 100%);
                    mask-image: radial-gradient(ellipse 80% 70% at 50% 40%, #000 40%, transparent 100%);
            animation: drift 24s linear infinite;
            z-index: 0;
        }
        @keyframes drift { from { background-position: 0 0; } to { background-position: 38px 38px; } }

        .wrap {
            position: relative; z-index: 1;
            min-height: 100vh;
            min-height: 100dvh;
            display: flex; align-items: center; justify-content: center;
            padding: 20px;
        }

        .terminal {
            width: 100%; max-width: 720px;
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 12px;
            box-shadow: 0 30px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.02) inset;
            overflow: hidden;
            opacity: 0; transform: translateY(14px) scale(0.99);
            animation: rise 0.5s cubic-bezier(.2,.7,.2,1) forwards;
        }
        @keyframes rise { to { opacity: 1; transform: none; } }

        .bar {
            display: flex; align-items: center; gap: 8px;
            padding: 12px 14px;
            background: var(--panel-bar);
            border-bottom: 1px solid var(--border);
        }
        .dot { width: 12px; height: 12px; border-radius: 50%; }
        .dot.r { background: #ff5f56; }
        .dot.y { background: #ffbd2e; }
        .dot.g { background: #27c93f; }
        .bar-title {
            flex: 1; text-align: center;
            font-size: 12px; color: var(--dim); letter-spacing: 0.5px;
            margin-right: 44px;
        }

        .screen {
            padding: 26px 24px 30px;
            min-height: 380px;
            font-size: 15px; line-height: 1.7;
            overflow-wrap: break-word;
        }

        .line { white-space: pre-wrap; }
        .prompt { color: var(--green); }
        .path { color: var(--blue); }
        .dim { color: var(--dim); }
        .orange { color: var(--orange-soft); }
        .comment { color: var(--dim); }

        .out { margin: 2px 0; }
        .gap { height: 14px; }

        .cursor {
            display: inline-block; width: 9px; height: 18px;
            background: var(--orange);
            vertical-align: -3px; margin-left: 2px;
            animation: blink 1s steps(2) infinite;
        }
        @keyframes blink { 0%,50% { opacity: 1; } 51%,100% { opacity: 0; } }

        .menu {
            margin-top: 18px;
            display: flex; flex-direction: column; gap: 10px;
            opacity: 0;
        }
        .menu.show { animation: fadeUp 0.4s ease forwards; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

        .cmd {
            display: flex; align-items: center; gap: 14px;
            width: 100%; text-align: left;
            background: rgba(255,255,255,0.015);
            border: 1px solid var(--border);
            border-radius: 9px;
            padding: 13px 16px;
            color: var(--txt);
            font-family: var(--mono); font-size: 14.5px;
            cursor: pointer;
            transition: border-color .18s, background .18s, transform .12s;
        }
        .cmd:hover, .cmd:focus-visible {
            border-color: var(--orange);
            background: rgba(249,115,22,0.07);
            transform: translateX(3px);
            outline: none;
        }
        .cmd .key { color: var(--orange-soft); white-space: nowrap; }
        .cmd .desc { color: var(--dim); font-size: 13px; margin-left: auto; }
        .cmd .arrow { color: var(--orange); opacity: 0; transition: opacity .18s; }
        .cmd:hover .arrow, .cmd:focus-visible .arrow { opacity: 1; }

        .inputline {
            display: flex; align-items: center; gap: 8px;
            margin-top: 20px; opacity: 0;
        }
        .inputline.show { animation: fadeUp 0.4s ease forwards; }
        .inputline input {
            flex: 1; min-width: 0;
            background: transparent; border: none; outline: none;
            color: var(--txt); font-family: var(--mono); font-size: 15px;
            caret-color: var(--orange);
        }
        .hint { margin-top: 14px; font-size: 12px; color: #4b5563; opacity: 0; }
        .hint.show { animation: fadeUp 0.4s ease forwards; }
        .hint b { color: var(--dim); font-weight: 600; }

        /* exec overlay */
        .exec { color: var(--green); margin-top: 16px; display: none; }
        .exec.show { display: block; animation: fadeUp 0.3s ease forwards; }

        @media (max-width: 560px) {
            .wrap { padding: 14px; }
            .screen { padding: 20px 16px 24px; font-size: 13.5px; min-height: 0; }
            .cmd { flex-wrap: wrap; gap: 6px; padding: 12px 14px; }
            .cmd .key { font-size: 13.5px; }
            .cmd .desc { margin-left: 0; width: 100%; font-size: 12px; }
            .cmd .arrow { display: none; }
            .bar-title { display: none; }
            .inputline { flex-wrap: wrap; }
            .inputline input { flex-basis: 100%; margin-top: 8px; font-size: 14px; }
        }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="terminal" role="application" aria-label="Portail WebPrime">
            <div class="bar">
                <span class="dot r"></span><span class="dot y"></span><span class="dot g"></span>
                <span class="bar-title">webprime — portail</span>
            </div>
            <div class="screen">
                <div id="boot"></div>

                <div class="menu" id="menu" aria-label="Choisissez une commande">
                    <button class="cmd" data-go="contact.html">
                        <span class="key">start --new</span>
                        <span class="desc"># Nouveau projet · devis gratuit</span>
                        <span class="arrow">→</span>
                    </button>
                    <button class="cmd" data-go="https://daelia-digital.fr">
                        <span class="key">discover --offers</span>
                        <span class="desc"># Voir nos offres &amp; tarifs</span>
                        <span class="arrow">→</span>
                    </button>
                </div>

                <div class="inputline" id="inputline">
                    <span class="prompt">webprime@portal</span><span class="dim">:</span><span class="path">~</span><span class="dim">$</span>
                    <input id="cmdInput" autocomplete="off" spellcheck="false"
                           aria-label="Tapez une commande" placeholder="tapez une commande ou cliquez ci-dessus…">
                </div>

                <div class="hint" id="hint">
                    <b>Astuce</b> — cliquez une commande, ou tapez <b>start</b>, <b>offers</b>, <b>help</b>.
                </div>

                <div class="exec" id="exec"></div>
            </div>
        </div>
    </div>

    <script>
        var boot = document.getElementById('boot');
        var menu = document.getElementById('menu');
        var inputline = document.getElementById('inputline');
        var hint = document.getElementById('hint');
        var execEl = document.getElementById('exec');
        var input = document.getElementById('cmdInput');

        // Le formulaire d'info projet (prmtkjdqs.html) reste un lien privé envoyé par email :
        // il n'apparaît PAS dans le portail.

        // ── Boot sequence (machine à écrire) ──
        var SCRIPT = [
            { t: 'webprime@portal:~$ ', cls: 'prompt' },
            { t: './welcome.sh\n', cls: '' },
            { gap: true },
            { t: 'WebPrime // portail des projets', cls: 'orange', nl: true },
            { t: 'Initialisation', cls: 'dim' }, { dots: true },
            { t: ' ok', cls: 'prompt', nl: true },
            { gap: true },
            { t: 'Que souhaitez-vous faire ?', cls: '', nl: true }
        ];

        var typeSpeed = 18;
        function typewriter(done) {
            var idx = 0;
            function step() {
                if (idx >= SCRIPT.length) { done(); return; }
                var seg = SCRIPT[idx++];
                if (seg.gap) { boot.appendChild(div('gap')); return step(); }
                if (seg.dots) {
                    var d = span('dim'); boot.appendChild(d);
                    var n = 0, iv = setInterval(function () {
                        d.textContent += '.'; if (++n >= 3) { clearInterval(iv); setTimeout(step, 120); }
                    }, 160);
                    return;
                }
                var el = span(seg.cls);
                boot.appendChild(el);
                var i = 0, txt = seg.t;
                (function typ() {
                    if (i < txt.length) { el.textContent += txt[i++]; setTimeout(typ, typeSpeed); }
                    else { if (seg.nl) boot.appendChild(document.createElement('br')); setTimeout(step, 40); }
                })();
            }
            step();
        }
        function span(cls) { var s = document.createElement('span'); if (cls) s.className = cls; s.className += ' line'; return s; }
        function div(cls) { var d = document.createElement('div'); d.className = cls; return d; }

        typewriter(function () {
            menu.classList.add('show');
            setTimeout(function () { inputline.classList.add('show'); }, 260);
            setTimeout(function () { hint.classList.add('show'); input.focus(); }, 520);
        });

        // ── Navigation ──
        function go(target) {
            var label = target.indexOf('http') === 0 ? 'discover --offers' :
                        (target === 'contact.html' ? 'start --new' : target);
            run(label, 'Ouverture', function () { window.location.href = target; });
        }

        function run(label, msg, after, stay) {
            menu.style.pointerEvents = 'none';
            execEl.className = 'exec show';
            execEl.innerHTML = '<span class="prompt">webprime@portal:~$</span> ' + esc(label);
            var dots = document.createElement('span'); dots.className = 'dim';
            var body = document.createElement('div'); body.style.marginTop = '6px';
            body.appendChild(document.createTextNode(msg + ' ')); body.appendChild(dots);
            execEl.appendChild(body);
            var n = 0, iv = setInterval(function () {
                dots.textContent += '.';
                if (++n >= 3) {
                    clearInterval(iv);
                    if (stay) { menu.style.pointerEvents = ''; }
                    else { setTimeout(after, 350); }
                }
            }, 180);
        }

        function esc(s) { return s.replace(/[&<>]/g, function (c) { return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' })[c]; }); }

        // clicks
        Array.prototype.forEach.call(document.querySelectorAll('.cmd'), function (btn) {
            btn.addEventListener('click', function () { go(btn.getAttribute('data-go')); });
        });

        // typed input
        input.addEventListener('keydown', function (e) {
            if (e.key !== 'Enter') return;
            var v = input.value.trim().toLowerCase();
            input.value = '';
            if (!v) return;
            if (v.indexOf('start') === 0 || v.indexOf('new') === 0)         return go('contact.html');
            if (v.indexOf('offer') === 0 || v.indexOf('discover') === 0 ||
                v.indexOf('tarif') === 0 || v.indexOf('prix') === 0)        return go('https://daelia-digital.fr');
            if (v === 'help' || v === 'aide' || v === '?')
                return run('help', 'start = devis · offers = nos offres', function () {}, true);
            run(v, 'commande inconnue — essayez : start, offers, client, help', function () {}, true);
        });
    </script>
</body>
</html>
